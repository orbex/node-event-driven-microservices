services:

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.1.2
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp 1
      - --memory 1G
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  order-service:
    build: ./order-service
    depends_on:
      - redpanda
    ports:
      - "3000:3000"

  analytics-service:
    build: ./analytics-service
    depends_on:
      - redpanda
